services:
  postgres:
    image: postgres:16
    container_name: streamer_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql
      - ./sql/03_views_procedures_triggers.sql:/docker-entrypoint-initdb.d/03_views_procedures_triggers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  seeder:
    image: python:3.11-slim
    container_name: streamer_seeder
    depends_on:
      postgres:
        condition: service_healthy   # <-- só sobe quando o healthcheck passar
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./seed:/app/seed
    working_dir: /app/seed
    command: >
      bash -c "pip install psycopg2-binary faker python-dotenv &&
               python create-table.py"

volumes:
  pgdata: